<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#bg)"/>
  <!-- Grid -->
  <rect x="0" y="0" width="800" height="320" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <!-- Diagonal accent -->
  <polygon points="0,0 280,0 220,320 0,320" fill="#e8001c" opacity="0.04"/>
  <!-- Label -->
  <text x="400" y="165" text-anchor="middle" fill="#1e1e1e" font-family="monospace" font-size="18" letter-spacing="8">BANNER</text>
</svg>
